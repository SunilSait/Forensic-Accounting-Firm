<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | ForensicEdge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: ['selector', '[data-theme="dark"]'], theme: { extend: { colors: { primary: { DEFAULT: '#0B1120', light: '#1E293B', dark: '#060A14' }, gold: { DEFAULT: '#D4A843', light: '#E8C97A', dark: '#B8922E' }, teal: { DEFAULT: '#14B8A6', light: '#2DD4BF' } }, fontFamily: { heading: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/pages.css">
</head>

<body>
    <div class="coming-soon-page">
        <div class="hero-bg"></div>
        <div class="hero-grid-pattern"
            style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);background-size:60px 60px;">
        </div>

        <!-- Header Bar -->
        <div
            style="position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;">
            <!-- Logo / Home Link -->
            <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:inherit;">
                <div
                    style="width:36px;height:36px;background:linear-gradient(135deg, var(--accent-gold),var(--accent-gold-dark));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;">
                    <i data-lucide="shield" style="width:18px;height:18px;color:#fff;"></i>
                </div>
                <span
                    style="font-family:var(--font-heading);font-weight:700;font-size:1.15rem;color:var(--text-primary);">Forensic<span
                        style="color:var(--accent-gold);">Edge</span></span>
            </a>
            <!-- LTR/RTL + Theme Toggle -->
            <div style="display:flex;align-items:center;gap:0.5rem;">
                <button onclick="toggleDir()"
                    style="font-size:0.7rem;font-weight:700;border:1px solid var(--border-color);color:var(--text-secondary);padding:0.3rem 0.6rem;border-radius:var(--radius-sm);background:transparent;cursor:pointer;transition:all 0.2s;"
                    onmouseover="this.style.borderColor='var(--accent-gold)';this.style.color='var(--accent-gold)'"
                    onmouseout="this.style.borderColor='var(--border-color)';this.style.color='var(--text-secondary)'">LTR
                    / RTL</button>
                <button class="theme-toggle"
                    style="background:transparent;border:none;color:var(--text-secondary);cursor:pointer;padding:0.4rem;border-radius:var(--radius-full);transition:color 0.2s;"
                    onmouseover="this.style.color='var(--accent-gold)'"
                    onmouseout="this.style.color='var(--text-secondary)'">
                    <i data-lucide="moon" style="width:18px;height:18px;"></i>
                </button>
            </div>
        </div>

        <div style="position:relative;z-index:2;" class="animate-fadeInUp">
            <div
                style="width:64px;height:64px;margin:0 auto var(--space-6);background:linear-gradient(135deg, var(--accent-gold),var(--accent-gold-dark));border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;">
                <i data-lucide="rocket" style="width:32px;height:32px;color:#fff;"></i>
            </div>

            <h1 class="error-title" style="font-size:2.5rem;">Something Exciting is Coming</h1>
            <p class="error-desc" style="max-width:480px;">We're working hard to bring you a new experience. Stay tuned
                and be the first to know when we launch.</p>

            <!-- Countdown -->
            <div class="countdown-grid">
                <div class="countdown-item">
                    <div class="countdown-value" id="cd-days">00</div>
                    <div class="countdown-label">Days</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="cd-hours">00</div>
                    <div class="countdown-label">Hours</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="cd-minutes">00</div>
                    <div class="countdown-label">Minutes</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="cd-seconds">00</div>
                    <div class="countdown-label">Seconds</div>
                </div>
            </div>

            <!-- Email Subscription -->
            <div style="max-width:440px;margin:0 auto;">
                <form style="display:flex;gap:var(--space-3);"
                    onsubmit="event.preventDefault();alert('Thank you! You will be notified at launch.');">
                    <input type="email" class="form-input" placeholder="Enter your email" required
                        style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:#fff;flex:1;">
                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="bell" style="width:16px;height:16px;"></i>
                        Notify Me
                    </button>
                </form>
                <p style="text-align:center;margin-top:var(--space-4);font-size:0.8rem;color:var(--gray-500);">We won't
                    spam you. Unsubscribe at any time.</p>
            </div>
        </div>
    </div>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/main.js"></script>
    <script>lucide.createIcons();</script>

    <script>
        // LTR/RTL Direction Toggle
        function toggleDir() {
            const html = document.documentElement;
            const newDir = html.dir === 'ltr' ? 'rtl' : 'ltr';
            html.dir = newDir;
            localStorage.setItem('site-direction', newDir);
        }
        (function () {
            const savedDir = localStorage.getItem('site-direction');
            document.documentElement.dir = savedDir || 'ltr';
        })();
    </script>
</body>

</html>
