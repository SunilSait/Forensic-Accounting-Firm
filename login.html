<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure client portal login - ForensicEdge forensic accounting dashboard.">
    <title>Client Portal Login | ForensicEdge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#D4A843', dark: '#0B1120', teal: '#14B8A6' }, fontFamily: { heading: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Outfit', sans-serif;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .anim-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body class="bg-slate-900 relative overflow-hidden">
    <!-- Background -->
    <div class="absolute inset-0 z-0">
        <img src="assets/images/hero-login.png" alt="" class="w-full h-full object-cover opacity-20">
        <div class="absolute inset-0 bg-gradient-to-br from-slate-900/90 via-slate-900/60 to-slate-900/90"></div>
        <div class="absolute inset-0 opacity-[0.03]"
            style="background-image: radial-gradient(#D4A843 1px, transparent 1px); background-size: 30px 30px;"></div>
    </div>

    <!-- Back to Home -->
    <a href="index.html"
        class="absolute top-6 left-6 z-20 flex items-center gap-2 text-slate-400 text-sm hover:text-primary transition-colors">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <!-- Theme Toggle -->
    <button onclick="toggleTheme()"
        class="absolute top-6 right-6 z-20 p-2 rounded-full text-slate-400 hover:text-white transition-colors">
        <i id="theme-icon" class="fas fa-moon"></i>
    </button>

    <!-- Login Card -->
    <div class="relative z-10 w-full max-w-md mx-4 anim-up">
        <div class="bg-white/[0.07] backdrop-blur-xl border border-white/10 rounded-[2rem] p-10 shadow-2xl">
            <!-- Logo -->
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-primary/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-shield-alt text-primary text-2xl"></i>
                </div>
                <h1 class="text-3xl font-black text-white font-heading">Welcome Back</h1>
                <p class="text-slate-400 text-sm mt-2">Sign in to your secure portal</p>
            </div>

            <!-- Portal Selection -->
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button onclick="selectPortal('user')" id="btn-user"
                    class="portal-btn active-portal p-4 rounded-2xl border-2 border-primary bg-primary/10 text-center transition-all">
                    <i class="fas fa-user text-primary text-xl mb-2 block"></i>
                    <span class="text-white font-bold text-sm">User Portal</span>
                    <span class="text-[10px] text-slate-400 block mt-1">Client Dashboard</span>
                </button>
                <button onclick="selectPortal('admin')" id="btn-admin"
                    class="portal-btn p-4 rounded-2xl border-2 border-white/10 bg-white/5 text-center transition-all hover:border-white/20">
                    <i class="fas fa-cogs text-red-400 text-xl mb-2 block"></i>
                    <span class="text-white font-bold text-sm">Admin Portal</span>
                    <span class="text-[10px] text-slate-400 block mt-1">Administration</span>
                </button>
            </div>

            <input type="hidden" id="portal-type" value="user">

            <!-- Form -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-2 block">Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="email" placeholder="you@company.com" required id="login-email"
                            class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3.5 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-primary transition-all text-sm">
                    </div>
                </div>
                <div>
                    <label
                        class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-2 block">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="password" placeholder="Enter your password" required id="login-password"
                            class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-12 py-3.5 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-primary transition-all text-sm">
                        <button type="button" onclick="togglePw()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors"><i
                                id="pw-icon" class="fas fa-eye text-sm"></i></button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-400 cursor-pointer"><input type="checkbox"
                            class="accent-primary w-4 h-4"> Remember me</label>
                    <a href="#" class="text-primary hover:underline font-medium">Forgot password?</a>
                </div>

                <button type="submit" id="login-submit"
                    class="w-full bg-primary text-white py-4 rounded-2xl font-black text-lg hover:opacity-90 transition-all active:scale-[0.98] shadow-xl shadow-primary/20">
                    <i class="fas fa-sign-in-alt mr-2"></i> Sign In
                </button>
            </form>

            <div class="flex items-center gap-4 my-8">
                <div class="flex-1 h-px bg-white/10"></div><span class="text-xs text-slate-500 font-bold uppercase">or
                    continue with</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button
                    class="py-3 rounded-xl border border-white/10 bg-white/5 text-white font-medium text-sm hover:bg-white/10 transition-all"><i
                        class="fas fa-fingerprint mr-2 text-primary"></i> Biometric</button>
                <button
                    class="py-3 rounded-xl border border-white/10 bg-white/5 text-white font-medium text-sm hover:bg-white/10 transition-all"><i
                        class="fas fa-mobile-alt mr-2 text-teal"></i> 2FA Code</button>
            </div>

            <p class="text-center mt-8 text-xs text-slate-500"><i class="fas fa-shield-alt mr-1 text-green-500"></i>
                256-bit SSL Encrypted Connection</p>
        </div>
    </div>

    <script>
        let portalType = 'user';
        function selectPortal(type) {
            portalType = type;
            document.getElementById('portal-type').value = type;
            document.querySelectorAll('.portal-btn').forEach(b => { b.classList.remove('active-portal'); b.style.borderColor = 'rgba(255,255,255,0.1)'; b.style.background = 'rgba(255,255,255,0.05)'; });
            const btn = type === 'user' ? document.getElementById('btn-user') : document.getElementById('btn-admin');
            btn.classList.add('active-portal');
            if (type === 'user') { btn.style.borderColor = '#D4A843'; btn.style.background = 'rgba(212,168,67,0.1)'; }
            else { btn.style.borderColor = '#EF4444'; btn.style.background = 'rgba(239,68,68,0.1)'; }
        }
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.getElementById('login-submit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Signing in...';
            btn.disabled = true;
            setTimeout(() => { window.location.href = portalType === 'admin' ? 'admin-dashboard.html' : 'dashboard.html'; }, 1500);
        });
        function togglePw() { const p = document.getElementById('login-password'); const i = document.getElementById('pw-icon'); if (p.type === 'password') { p.type = 'text'; i.className = 'fas fa-eye-slash text-sm'; } else { p.type = 'password'; i.className = 'fas fa-eye text-sm'; } }
        function toggleTheme() { const h = document.documentElement; const i = document.getElementById('theme-icon'); if (h.classList.contains('dark')) { h.classList.remove('dark'); localStorage.setItem('theme', 'light'); i.className = 'fas fa-moon'; } else { h.classList.add('dark'); localStorage.setItem('theme', 'dark'); i.className = 'fas fa-sun'; } }
        selectPortal('user');
    </script>
</body>

</html>
