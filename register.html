<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <script>if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Create your ForensicEdge account - Access forensic accounting tools and secure client portal.">
    <title>Register | ForensicEdge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#D4A843', dark: '#0B1120', teal: '#14B8A6' }, fontFamily: { heading: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Outfit', sans-serif;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .anim-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 0;
        }
    </style>
</head>

<body class="dark:bg-slate-900 bg-slate-100 relative overflow-x-hidden transition-colors">
    <!-- Background -->
    <div class="absolute inset-0 z-0">
        <img src="assets/images/hero-login.png" alt=""
            class="w-full h-full object-cover opacity-20 dark:opacity-20 opacity-5">
        <div
            class="absolute inset-0 bg-gradient-to-br dark:from-slate-900/90 dark:via-slate-900/60 dark:to-slate-900/90 from-slate-100/90 via-slate-100/70 to-slate-100/90">
        </div>
        <div class="absolute inset-0 opacity-[0.03]"
            style="background-image: radial-gradient(#D4A843 1px, transparent 1px); background-size: 30px 30px;"></div>
    </div>

    <!-- Header Bar -->
    <div class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-4 sm:px-6 py-5 sm:py-6">
        <!-- Logo / Home Link -->
        <a href="index.html" class="flex items-center gap-2 no-underline hover:opacity-80 transition-opacity">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white text-sm">
                <i class="fas fa-shield-alt"></i>
            </div>
            <span class="font-bold text-lg tracking-tight font-heading dark:text-white text-slate-900">Forensic<span
                    class="text-primary">Edge</span></span>
        </a>
        <!-- Theme Toggle & LTR/RTL -->
        <div class="flex items-center gap-2">
            <button onclick="toggleDir()"
                class="text-xs font-bold border dark:border-slate-600 border-slate-300 dark:text-slate-400 text-slate-600 px-2 py-1 rounded hover:border-primary hover:text-primary transition-all">LTR
                / RTL</button>
            <button onclick="toggleTheme()"
                class="p-2 rounded-full dark:text-slate-400 text-slate-600 hover:text-primary transition-colors">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
        </div>
    </div>

    <!-- Register Card -->
    <div class="relative z-10 w-full max-w-md px-4 pt-20 sm:pt-8 anim-up">
        <div
            class="dark:bg-white/[0.07] bg-white backdrop-blur-xl dark:border-white/10 border-slate-200 border rounded-2xl sm:rounded-[2rem] p-6 sm:p-10 shadow-2xl dark:shadow-2xl shadow-slate-200/50">
            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex flex-col items-center gap-3 mb-4 group no-underline">
                    <div class="w-14 h-14 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/20 group-hover:scale-105 transition-transform">
                        <i class="fas fa-shield-alt text-2xl"></i>
                    </div>
                    <span class="font-bold text-2xl tracking-tight font-heading dark:text-white text-slate-900">Forensic<span class="text-primary">Edge</span></span>
                </a>
                <h1 class="text-3xl font-black dark:text-white text-slate-900 font-heading mt-2">Create Account</h1>
                <p class="dark:text-slate-400 text-slate-500 text-sm mt-2">Join ForensicEdge and get started</p>
            </div>

            <!-- Form -->
            <form id="register-form" class="space-y-5">
                <div>
                    <label
                        class="text-xs dark:text-slate-400 text-slate-500 font-bold uppercase tracking-widest mb-2 block">Full
                        Name</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="text" placeholder="John Doe" required id="register-name"
                            class="w-full dark:bg-white/5 bg-slate-50 dark:border-white/10 border-slate-200 border rounded-xl pl-11 pr-4 py-3.5 dark:text-white text-slate-900 dark:placeholder-slate-500 placeholder-slate-400 outline-none focus:ring-2 focus:ring-primary transition-all text-sm">
                    </div>
                </div>
                <div>
                    <label
                        class="text-xs dark:text-slate-400 text-slate-500 font-bold uppercase tracking-widest mb-2 block">Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="email" placeholder="you@company.com" required id="register-email"
                            class="w-full dark:bg-white/5 bg-slate-50 dark:border-white/10 border-slate-200 border rounded-xl pl-11 pr-4 py-3.5 dark:text-white text-slate-900 dark:placeholder-slate-500 placeholder-slate-400 outline-none focus:ring-2 focus:ring-primary transition-all text-sm">
                    </div>
                </div>
                <div>
                    <label
                        class="text-xs dark:text-slate-400 text-slate-500 font-bold uppercase tracking-widest mb-2 block">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="password" placeholder="Create a strong password" required id="register-password"
                            class="w-full dark:bg-white/5 bg-slate-50 dark:border-white/10 border-slate-200 border rounded-xl pl-11 pr-12 py-3.5 dark:text-white text-slate-900 dark:placeholder-slate-500 placeholder-slate-400 outline-none focus:ring-2 focus:ring-primary transition-all text-sm">
                        <button type="button" onclick="togglePw('register-password', 'pw-icon-1')"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors"><i
                                id="pw-icon-1" class="fas fa-eye text-sm"></i></button>
                    </div>
                </div>
                <div>
                    <label
                        class="text-xs dark:text-slate-400 text-slate-500 font-bold uppercase tracking-widest mb-2 block">Confirm
                        Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="password" placeholder="Confirm your password" required id="register-confirm"
                            class="w-full dark:bg-white/5 bg-slate-50 dark:border-white/10 border-slate-200 border rounded-xl pl-11 pr-12 py-3.5 dark:text-white text-slate-900 dark:placeholder-slate-500 placeholder-slate-400 outline-none focus:ring-2 focus:ring-primary transition-all text-sm">
                        <button type="button" onclick="togglePw('register-confirm', 'pw-icon-2')"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors"><i
                                id="pw-icon-2" class="fas fa-eye text-sm"></i></button>
                    </div>
                </div>

                <div class="flex items-center gap-2 text-sm">
                    <input type="checkbox" required class="accent-primary w-4 h-4">
                    <span class="dark:text-slate-400 text-slate-500">I agree to the <a href="#"
                            class="text-primary hover:underline font-medium">Terms of Service</a> and <a href="#"
                            class="text-primary hover:underline font-medium">Privacy Policy</a></span>
                </div>

                <button type="submit" id="register-submit"
                    class="w-full bg-primary text-white py-4 rounded-2xl font-black text-lg hover:opacity-90 transition-all active:scale-[0.98] shadow-xl shadow-primary/20">
                    <i class="fas fa-user-plus mr-2"></i> Create Account
                </button>
            </form>

            <p class="text-center mt-6 text-sm dark:text-slate-400 text-slate-500">Already have an account? <a
                    href="login.html" class="text-primary font-bold hover:underline">Sign In</a></p>

            <p class="text-center mt-4 text-xs dark:text-slate-500 text-slate-400"><i
                    class="fas fa-lock mr-1 text-primary"></i>
                256-bit SSL Encrypted Connection</p>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const pw = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            if (pw !== confirm) {
                alert('Passwords do not match!');
                return;
            }
            const btn = document.getElementById('register-submit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Creating account...';
            btn.disabled = true;
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        });
        function togglePw(fieldId, iconId) { const p = document.getElementById(fieldId); const i = document.getElementById(iconId); if (p.type === 'password') { p.type = 'text'; i.className = 'fas fa-eye-slash text-sm'; } else { p.type = 'password'; i.className = 'fas fa-eye text-sm'; } }
        function toggleTheme() { const h = document.documentElement; const i = document.getElementById('theme-icon'); if (h.classList.contains('dark')) { h.classList.remove('dark'); localStorage.setItem('theme', 'light'); i.className = 'fas fa-moon'; } else { h.classList.add('dark'); localStorage.setItem('theme', 'dark'); i.className = 'fas fa-sun'; } }
    </script>

    <script>
        // LTR/RTL Direction Toggle
        function toggleDir() {
            const html = document.documentElement;
            const newDir = html.dir === 'ltr' ? 'rtl' : 'ltr';
            html.dir = newDir;
            localStorage.setItem('site-direction', newDir);
        }
        (function () {
            const savedDir = localStorage.getItem('site-direction');
            document.documentElement.dir = savedDir || 'ltr';
        })();
    </script>
</body>

</html>
